<!DOCTYPE html>
<html>
<head>
    <title>My Store</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:20px;
        }

        h1{
            text-align:center;
        }

        .products{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            justify-content:center;
        }

        .card{
            background:white;
            width:250px;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:8px;
        }

        .card a{
            text-decoration:none;
            color:black;
        }

        .card a:hover{
            color:blue;
        }

        .price{
            color:green;
            font-weight:bold;
            font-size:20px;
        }

        button{
            background:blue;
            color:white;
            border:none;
            padding:10px;
            width:100%;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:darkblue;
        }
    </style>
</head>

<body>

<h1>My Store</h1>

<div class="products">

{% for product in products %}

<div class="card">

    {% if product.image %}
        <img src="{{ product.image }}" alt="{{ product.name }}">
    {% endif %}

<h2>
    <a href="{% url 'product_detail' product.id %}">
        {{ product.name }}
    </a>
</h2>

    <p>{{ product.description }}</p>

    <p class="price">₹{{ product.price }}</p>

<a href="{% url 'add_to_cart' product.id %}">
    <button>Add to Cart</button>
</a>
<h2>Login</h2>

<form method="POST">
  {% csrf_token %}
  <input type="text" name="username" placeholder="Username">
  <input type="password" name="password" placeholder="Password">
  <button type="submit">Login</button>
</form>

<p style="color:red">{{ error }}</p>

</div>

{% endfor %}

</div>

</body>
</html>
