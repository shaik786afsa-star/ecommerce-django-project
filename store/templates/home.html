<!DOCTYPE html>
<html>
<head>
    <title>My Store</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:0;
        }

        /* Navbar */
        #navbar{
            height:60px;
            background:#0f1111;
            display:flex;
            align-items:center;
            padding:0 20px;
        }

        #navbar a{
            color:white;
            text-decoration:none;
            margin-right:30px;
            font-size:16px;
        }

        #navbar a:hover{
            color:#00bfff;
        }

        #logo{
            font-size:22px;
            font-weight:bold;
            color:#f08804 !important;
        }

        .search-box{
            margin-left:auto;
        }

        .search-box input{
            padding:8px;
            width:250px;
            border-radius:4px;
            border:none;
        }

        .search-box button{
            padding:8px 12px;
            border:none;
            background:#f08804;
            color:white;
            border-radius:4px;
            cursor:pointer;
        }
        .search-box form{
        display:flex;
        gap:5px;
        }

        h1{
            text-align:center;
            margin:20px 0;
        }

        .products{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            justify-content:center;
            padding:20px;
        }

        .card{
            background:white;
            width:250px;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:8px;
        }

        .card h2 a{
            text-decoration:none;
            color:black;
        }

        .card h2 a:hover{
            color:blue;
        }

        .price{
            color:green;
            font-weight:bold;
            font-size:20px;
        }

        .cart-btn{
            background:blue;
            color:white;
            border:none;
            padding:10px;
            width:100%;
            cursor:pointer;
            border-radius:5px;
        }

        .cart-btn:hover{
            background:darkblue;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div id="navbar">
        <a id="logo" href="/">Amazon.in</a>

        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'cart' %}">My Cart</a>
        <a href="{% url 'my_orders' %}">Orders</a>

        <div class="search-box">
    <form method="GET" action="{% url 'home' %}">
        <input
            type="text"
            name="q"
            placeholder="Search products"
            value="{{ request.GET.q }}"
        >
        <button type="submit">Search</button>
    </form>
    </div>
    </div>

    <h1>My Store</h1>

    <div class="products">

        {% for product in products %}

        <div class="card">

            {% if product.image %}
                <img src="{{ product.image }}" alt="{{ product.name }}">
            {% endif %}

            <h2>
                <a href="{% url 'product_detail' product.id %}">
                    {{ product.name }}
                </a>
            </h2>

            <p>{{ product.description }}</p>

            <p class="price">₹{{ product.price }}</p>

            <a href="{% url 'add_to_cart' product.id %}">
                <button class="cart-btn">Add to Cart</button>
            </a>

        </div>

        {% endfor %}

    </div>

</body>
</html>
