<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
</head>
<body>

<h1>{{ product.name }}</h1>

{% if product.image %}
    <img src="{{ product.image }}" alt="{{ product.name }}" width="300">
{% endif %}

<p>{{ product.description }}</p>

<h2>₹{{ product.price }}</h2>

<button>Add to Cart</button>

<br><br>

<a href="/">← Back to Home</a>

</body>
</html>
